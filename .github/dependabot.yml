version: 2

updates:
  # Gradle version catalog (gradle/libs.versions.toml) and build files across
  # all modules (app/phone, app/tv, core, data, player/*, modes/*, settings,
  # setup). A single root entry is sufficient: Dependabot's Gradle updater
  # walks settings.gradle.kts to discover every included subproject and
  # updates the shared version catalog directly.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps)"
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"

  # Keep the repo's own GitHub Actions workflow dependencies current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
